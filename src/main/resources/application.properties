spring.application.name=ami-service

# --- Database Configuration ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- Production Best Practices ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- API Configuration ---
api.base-url=https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
api.key=579b464db66ec23bdd000001fe62180a0527450156ac95919608f3d5
api.format=json
api.auth-header-name=api-key

# --- Sync Configuration ---
sync.states=Karnataka,Keralam,Tamil Nadu
# --- Hikari Connection Pool Optimization ---
# Validates connections before using them to prevent 'Connection is closed' errors
spring.datasource.hikari.connection-test-query=SELECT 1
# Ensure the pool removes stale connections faster
spring.datasource.hikari.max-lifetime=1800000
# Prevents idle connections from sitting for too long
spring.datasource.hikari.idle-timeout=600000
