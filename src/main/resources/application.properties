spring.application.name=ami-service

# --- Database Configuration (Uses Env Vars) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- Production Best Practices ---
# Use 'update' to maintain schema, or 'validate' for stricter production environments
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable Open Session in View to improve performance and prevent connection hold-ups
spring.jpa.open-in-view=false

# --- API Configuration ---
api.base-url=https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
api.key=579b464db66ec23bdd000001fe62180a0527450156ac95919608f3d5
api.format=json
api.auth-header-name=api-key

# --- Sync Configuration ---
sync.states=Karnataka,Keralam,Tamil Nadu

# --- Hikari Connection Pool Optimization ---
# Validates connections before using them to prevent 'Connection is closed' errors
spring.datasource.hikari.connection-test-query=SELECT 1

# Max lifetime set to 10 minutes (600000ms) to ensure connections refresh before server timeouts
spring.datasource.hikari.max-lifetime=600000

# Fixed-size pool configuration (Removing idle-timeout)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10
