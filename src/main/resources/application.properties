spring.application.name=ami-service
logging.level.com.amihub.ami=DEBUG

# --- Port Configuration for Render ---
server.port=${PORT:8080}
server.address=0.0.0.0

# --- Database Configuration ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- Production Best Practices ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- API Configuration ---
api.base-url=https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
api.key=579b464db66ec23bdd000001fe62180a0527450156ac95919608f3d5
api.format=json
api.auth-header-name=api-key

# --- Sync Configuration ---
sync.states=Karnataka,Keralam,Tamil Nadu

# --- Hikari Connection Pool Optimization ---
spring.datasource.hikari.connection-test-query=SELECT 1

# Reduce max-lifetime to rotate connections more frequently (5 minutes)
spring.datasource.hikari.max-lifetime=300000

# Aggressive validation timeout to clear dead connections faster
spring.datasource.hikari.validation-timeout=2000

# Reduced pool size for faster initialization and memory efficiency
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
