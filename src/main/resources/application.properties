spring.application.name=ami-service

# --- Database Configuration (Uses Env Vars) ---
# Render will provide the DATABASE_URL, DB_USER, and DB_PASSWORD
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- Production Best Practices ---
# Use 'validate' to prevent schema changes at runtime
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- API Configuration ---
api.base-url=https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
# Keep the key here for now, or use ${API_KEY} if you want to be extra secure
api.key=579b464db66ec23bdd000001fe62180a0527450156ac95919608f3d5
api.format=json
api.auth-header-name=api-key

# --- Sync Configuration ---
sync.states=Karnataka,Keralam,Tamil Nadu
